name: Greet User
on:
  workflow_dispatch:
    inputs:
      first_name:
        description: 'Type in your first name'
        required: true
        type: string
      last_name:
        description: 'Type in your last name'
        required: true
        type: string

jobs:
  print_name:
    runs-on: ubuntu-latest
    steps:
      - name: Display Full Name
        run: |
          echo "The full name is: ${{ github.event.inputs.first_name }} ${{ github.event.inputs.last_name }}"